{% extends 'base.html' %}
{% block title %}Delete Deal – {{ CRM_COMPANY_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white fw-semibold"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete</div>
      <div class="card-body">
        <p>Are you sure you want to delete deal <strong>{{ object.title }}</strong>?</p>
        <form method="post">{% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'deals:deal_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
