{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign In – {{ CRM_COMPANY_NAME }}{% endblock %}

{% block auth_content %}
<div class="card shadow-sm border-0 rounded-4">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <i class="bi bi-briefcase-fill text-primary" style="font-size: 2.5rem;"></i>
      <h4 class="mt-2 fw-bold">{{ CRM_COMPANY_NAME }}</h4>
      <p class="text-muted mb-0">Sign in to your account</p>
    </div>
    {% crispy form %}
    <hr class="my-3">
    <p class="text-center text-muted small mb-0">
      Need help? Contact <a href="mailto:{{ CRM_SUPPORT_EMAIL }}">{{ CRM_SUPPORT_EMAIL }}</a>
    </p>
  </div>
</div>
{% endblock %}
