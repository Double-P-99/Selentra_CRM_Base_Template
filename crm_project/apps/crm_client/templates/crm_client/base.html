<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Selentra CRM{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar { min-height: 100vh; background: #1a1a2e; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 6px; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
        .stat-card { border: none; border-radius: 12px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar py-3 px-3">
            <div class="brand mb-4 ps-2">
                <i class="bi bi-grid-3x3-gap-fill me-2"></i>Selentra CRM
            </div>
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
                       href="{% url 'crm_client:dashboard' %}">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'company' in request.resolver_match.url_name %}active{% endif %}"
                       href="{% url 'crm_client:company_list' %}">
                        <i class="bi bi-building me-2"></i>Empresas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'opportunity' in request.resolver_match.url_name %}active{% endif %}"
                       href="{% url 'crm_client:opportunity_list' %}">
                        <i class="bi bi-trophy me-2"></i>Oportunidades
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'activity_list' %}active{% endif %}"
                       href="{% url 'crm_client:activity_list' %}">
                        <i class="bi bi-calendar-check me-2"></i>Actividades
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'reports' %}active{% endif %}"
                       href="{% url 'crm_client:reports' %}">
                        <i class="bi bi-bar-chart-line me-2"></i>Reportes
                    </a>
                </li>
            </ul>
            <hr class="border-secondary mt-4">
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/">
                        <i class="bi bi-gear me-2"></i>Admin
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/logout/">
                        <i class="bi bi-box-arrow-left me-2"></i>Salir
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main content -->
        <main class="col-md-10 py-4 px-4">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
